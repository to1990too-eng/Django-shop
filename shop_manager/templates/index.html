<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo App index</title>
</head>
<body>
    <h1>Добро пожаловать на наш сайт!</h1>
    <h3>
  Текущее время:
  <time id="live-clock" datetime="{% now 'Y-m-d\TH:i:s' %}">
    {% now "d.m.Y H:i:s" %}
  </time>
    </h3>

    <script>
  function updateClock() {
    const clockElement = document.getElementById('live-clock');
    const now = new Date();

    // Форматируем компоненты даты и времени с ведущими нулями
    const day = String(now.getDate()).padStart(2, '0');
    const month = String(now.getMonth() + 1).padStart(2, '0'); // Месяцы в JS идут от 0 до 11
    const year = now.getFullYear();

    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');

    // Собираем строку в формате: 16.06.2026 19:51:00
    const timeString = `${day}.${month}.${year} ${hours}:${minutes}:${seconds}`;

    // Обновляем текст на экране
    clockElement.textContent = timeString;

    // Обновляем атрибут datetime для корректности HTML
    clockElement.setAttribute('datetime', now.toISOString());
  }

  // Запускаем обновление каждую секунду (1000 миллисекунд)
  setInterval(updateClock, 1000);
</script>

</body>
</html>
